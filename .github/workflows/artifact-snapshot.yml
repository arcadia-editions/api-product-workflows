name: Artifact snapshots

on:
  workflow_call:
    inputs:
      workflow_ref:
        required: true
        type: string
      service_repository:
        required: true
        type: string
      plan:
        description: Trusted publication plan emitted by Artifact CI.
        required: true
        type: string
      source_sha:
        required: true
        type: string
      default_branch:
        required: false
        default: main
        type: string
      architecture_repository:
        required: false
        default: arcadia-editions/arcadia-editions-docs
        type: string
      architecture_ref:
        required: false
        default: main
        type: string
      architecture_manifest_path:
        required: false
        default: zenwave-architecture.yml
        type: string
    secrets:
      checkout_token:
        required: false
      maven_username:
        required: false
      maven_password_or_token:
        required: false
      apicurio_username:
        required: false
      apicurio_password_or_token:
        required: false

permissions:
  contents: read

concurrency:
  group: snapshot-${{ github.repository }}
  cancel-in-progress: false

jobs:
  snapshot:
    if: inputs.plan != '[]' && (github.ref_name == inputs.default_branch || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    environment: artifact-snapshots
    permissions:
      contents: read
    env:
      INPUT_SERVICE_REPOSITORY: ${{ inputs.service_repository }}
      INPUT_ARCHITECTURE_MANIFEST_PATH: ${{ inputs.architecture_manifest_path }}
      PLAN_JSON: ${{ inputs.plan }}
      MAVEN_REPOSITORY_URL: ${{ vars.MAVEN_SNAPSHOT_REPOSITORY_URL }}
      MAVEN_REPOSITORY_ID: ${{ vars.MAVEN_SNAPSHOT_REPOSITORY_ID }}
      MAVEN_REPOSITORY_USERNAME: ${{ secrets.maven_username }}
      MAVEN_REPOSITORY_PASSWORD_OR_TOKEN: ${{ secrets.maven_password_or_token }}
      APICURIO_REGISTRY_URL: ${{ vars.APICURIO_REGISTRY_URL }}
      APICURIO_MAVEN_PLUGIN_VERSION: ${{ vars.APICURIO_MAVEN_PLUGIN_VERSION || '3.2.2' }}
      APICURIO_USERNAME: ${{ secrets.apicurio_username }}
      APICURIO_PASSWORD_OR_TOKEN: ${{ secrets.apicurio_password_or_token }}
    steps:
      - name: Check out trusted source commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          path: source
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Check out workflow implementation
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: arcadia-editions/api-product-workflows
          ref: ${{ inputs.workflow_ref }}
          token: ${{ secrets.checkout_token || github.token }}
          path: pipeline
          persist-credentials: false

      - name: Check out architecture manifest
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: ${{ inputs.architecture_repository }}
          ref: ${{ inputs.architecture_ref }}
          token: ${{ secrets.checkout_token || github.token }}
          path: architecture
          persist-credentials: false

      - name: Set up pinned JDK
        uses: actions/setup-java@7a445ee88d4e23b52c33c877a462a2f6773c8420
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up pinned tools
        shell: bash
        run: |
          chmod +x pipeline/scripts/artifacts/*.sh
          pipeline/scripts/artifacts/setup-jbang.sh 0.138.0
          cd pipeline/spectral
          npm ci
          npm run bundle

      - name: Publish snapshot plan
        shell: bash
        run: |
          pipeline/scripts/artifacts/execute-plan.sh \
            snapshot "$PLAN_JSON" source pipeline \
            "architecture/$INPUT_ARCHITECTURE_MANIFEST_PATH" \
            "$INPUT_SERVICE_REPOSITORY" \
            pipeline/config/maven-settings.xml \
            source/target/artifacts

      - name: Upload file-backed Maven and generic trees
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: artifact-snapshots-${{ inputs.source_sha }}
          path: source/target/artifacts
          if-no-files-found: error
          retention-days: 14
